name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (startsWith(github.event.workflow_run.head_branch, '0') ||
      startsWith(github.event.workflow_run.head_branch, '1') ||
      startsWith(github.event.workflow_run.head_branch, '2') ||
      startsWith(github.event.workflow_run.head_branch, '3') ||
      startsWith(github.event.workflow_run.head_branch, '4') ||
      startsWith(github.event.workflow_run.head_branch, '5') ||
      startsWith(github.event.workflow_run.head_branch, '6') ||
      startsWith(github.event.workflow_run.head_branch, '7') ||
      startsWith(github.event.workflow_run.head_branch, '8') ||
      startsWith(github.event.workflow_run.head_branch, '9'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build

      - name: Set version from tag
        run: npm version "${{ github.event.workflow_run.head_branch }}" --no-git-tag-version
        working-directory: dist

      - run: npm publish --access public
        working-directory: dist
